      hpo_s2_val_checks: 3
      hpo_generation_budget: 32
      hpo_generation_budget_by_class:
        polyacrylate: 32
        polyether: 48
        polyamide: 48
        polyester: 48
        polyimide: 32
        polysulfone: 48
        polystyrene: 48
    S4_rl:
      pruner: hyperband
      pruner_min_resource: 2
      pruner_max_resource: auto
      pruner_reduction_factor: 3
      hpo_rl_num_steps: 256
      hpo_rl_proxy_eval_checks: 1
      hpo_s4_trajectories_per_batch: 8
      hpo_s4_replay_batch_size: 8
      hpo_generation_budget: 32
      hpo_generation_budget_by_class:
        polyacrylate: 32
        polyether: 48
        polyamide: 48
        polyester: 48
        polyimide: 32
        polysulfone: 48
        polystyrene: 48
    S4_ppo:
      pruner: hyperband
      pruner_min_resource: 2
      pruner_max_resource: auto
      pruner_reduction_factor: 3
      hpo_rl_num_steps: 256
      hpo_rl_proxy_eval_checks: 1
      hpo_s4_trajectories_per_batch: 8
      hpo_s4_replay_batch_size: 8
      hpo_generation_budget: 32
      hpo_generation_budget_by_class:
        polyacrylate: 32
        polyether: 48
        polyamide: 48
        polyester: 48
        polyimide: 32
        polysulfone: 48
        polystyrene: 48
    S4_grpo:
      pruner: hyperband
      pruner_min_resource: 2
      pruner_max_resource: auto
      pruner_reduction_factor: 3
      hpo_rl_num_steps: 256
      hpo_rl_proxy_eval_checks: 1
      hpo_s4_trajectories_per_batch: 8
      hpo_s4_replay_batch_size: 8
      hpo_generation_budget: 32
      hpo_generation_budget_by_class:
        polyacrylate: 32
        polyether: 48
        polyamide: 48
        polyester: 48
        polyimide: 32
        polysulfone: 48
        polystyrene: 48
    S4_dpo:
      pruner: none
      enable_sampling_pruning: false
      hpo_generation_budget: 32
      hpo_generation_budget_by_class:
        polyacrylate: 32
        polyether: 48
        polyamide: 48
        polyester: 48
        polyimide: 32
        polysulfone: 48
        polystyrene: 48
      hpo_s4_dpo_checkpoint_selection_mode: val_dpo_loss
      hpo_s4_dpo_num_epochs: 30
      hpo_decode_class_match_max_request_size: 512
      hpo_decode_class_match_max_total_raw_samples: 2048
      hpo_s4_dpo_cfg_scale_min: 1.0
      hpo_s4_dpo_offline_pair_budget_choices: [256, 512]
      hpo_s4_dpo_batch_size_choices: [16, 32]
      hpo_s4_dpo_d_water_budget_fraction_choices: [0.3, 0.5]
      hpo_s4_dpo_pair_source_choices: [target_row_synthetic, chi_aware_plus_target_row_synthetic]
      hpo_s4_dpo_synthetic_candidates_per_target_choices: [4, 8]
      efficiency_min_class_match_acceptance_rate: 0.02
      efficiency_min_generated_fraction: 0.75
  tie_epsilon: 1.0e-4
  method_budgets:
    S1: {n_trials: 50, timeout_hours_medium: 24}
    S2: {n_trials: 50, timeout_hours_medium: 24}
    S3: {n_trials: 50, timeout_hours_medium: 24}
    S4_rl: {n_trials: 50, timeout_hours_medium: 24}
    S4_ppo: {n_trials: 50, timeout_hours_medium: 24}
    S4_grpo: {n_trials: 50, timeout_hours_medium: 24}
    S4_dpo: {n_trials: 50, timeout_hours_medium: 24}
