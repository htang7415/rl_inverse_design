step5:
  split_mode: polymer
  classification_split_mode: polymer
  random_seed: 42
  num_sampling_rounds: 5
  sampling_seeds: [42, 43, 44, 45, 46]
  preserve_total_generation_across_rounds: true
  s0_use_configured_target_condition: true
  canonical_families: [S0, S1, S2, S3, S4]
  enabled_runs:
    - S0_raw_unconditional
    - S1_guided_frozen
    - S2_conditional
    - S2_cfg_2p0
    - S3_conditional_guided
    - S3_cfg_2p0
    - S4_rl_finetuned
    - S4_ppo
    - S4_grpo
    - S4_dpo
  enabled_runs_by_class_overrides:
    polyamide:
      - S0_raw_unconditional
      - S1_guided_frozen
      - S2_conditional
      - S3_conditional_guided
      - S3_cfg_2p0
      - S4_rl_finetuned
      - S4_ppo
      - S4_grpo
      - S4_dpo
  generation_budget: 512
  generation_budget_by_class:
    polyacrylate: 1024
    polyether: 1024
    polyamide: 1024
    polyester: 1024
    polyimide: 1024
    polysulfone: 1024
    polystyrene: 1024
  sampling_temperature: 1.0
  inference_batch_size: 128
  raw_generation_valid_only: false
  fail_on_split_leakage: true
  class_decode_prior_mode: "on"
  class_token_bias_start_frac: 0.5
  class_token_bias_start_frac_by_class_overrides:
    polyester: 0.25
    polystyrene: 0.25
    polysulfone: 0.25
  class_token_bias_strength: 1.5
  class_token_bias_strength_by_class_overrides:
    polyester: 2.5
    polystyrene: 2.5
    polysulfone: 2.5
  conditional_cfg_scale_early_frac: 1.0
  conditional_cfg_scale_ramp_start_frac: 0.0
  conditional_cfg_scale_retry_multiplier: 1.0
  conditional_cfg_scale_early_frac_overrides:
    polystyrene: 0.75
  conditional_cfg_scale_ramp_start_frac_overrides:
    polystyrene: 0.6
  conditional_cfg_scale_retry_multiplier_overrides:
    polystyrene: 1.25
  chi_band_epsilon: 0.25
  chi_target_bound_mode: point_estimate
  target_sa_max: 4.0
  reporting_target_sa_max_by_class:
    polyacrylate: 3.5
    polyether: 4.0
    polyamide: 4.0
    polyester: 4.0
    polyimide: 4.0
    polysulfone: 4.0
    polystyrene: 4.0
  discovery_target_sa_max_by_class:
    polyacrylate: 4.0
    polyether: 4.5
    polyamide: 5.0
    polyester: 5.0
    polyimide: 5.5
    polysulfone: 5.5
    polystyrene: 5.0
  figure_font_size: 16
  available_target_classes: [polyimide, polyamide, polyester, polyether, polyacrylate, polystyrene, polysulfone]
  c_target: polyimide

  s1:
    best_of_k: 4
    guidance_start_frac: 0.5
    sol_log_prob_floor: -5.0
    w_sol: 1.0
    w_chi: 2.0
    w_sa: 1.0
    w_sa_continuous: 0.5
    invalid_reward_penalty: -10.0
    embedding_timestep: 1

  s2:
    variant: pure
    checkpoint_selection_metric: auto
    finetune_last_layers: null
    optimizer: adamw
    learning_rate: 3.0e-4
    weight_decay: 0.01
    batch_size: 128
    warmup_steps: 1000
    warmup_schedule: linear
    lr_schedule: constant_after_warmup
    max_steps: 20000
    val_check_interval_steps: 500
    early_stopping_patience_checks: 10
    early_stopping_min_delta: 1.0e-4
    max_grad_norm: 1.0
    condition_dropout_rate: 0.1
    condition_dropout_mode: joint_all_conditions
    chi_target_augmentation_rate: 0.15
    train_batch_mix:
      d_chi: 0.8
      d_water: 0.2
    mt_aux:
      head_type: linear
      soluble_loss_weight: 0.1
      chi_loss_weight: 0.1
    cfg_scale: 0.5
    cfg_scale_by_class_overrides:
      polyacrylate: 1.0
      polyamide: 2.0
      polyester: 1.0

  s3:
    supervised_train_config_source: s2
    best_of_k: 4
    guidance_start_frac: 0.5
    guidance_start_frac_by_class_overrides:
      polyamide: 0.5
      polyimide: 0.1
      polyester: 0.5
    sol_log_prob_floor: -5.0
    sol_log_prob_floor_by_class_overrides:
      polyimide: -12.0
    w_sol: 1.0
    w_sol_by_class_overrides:
      polyimide: 4.0
    w_chi: 2.0
    w_chi_by_class_overrides:
      polyimide: 0.5
    invalid_reward_penalty: -10.0
    embedding_timestep: 1
    cfg_scale: 1.0
    cfg_scale_by_class_overrides:
      polyamide: 2.0
      polyimide: 1.0
      polyester: 1.0

  s4:
    alignment_mode: rl
    supervised_train_config_source: s2
    warm_start_policy: shared_family_producer
    warm_start_producer_name: S4_supervised_warm_start
    optimizer: adamw
    cfg_scale: 1.0
    cfg_scale_by_class_overrides:
      polyamide: 2.0
    count_training_oracle_calls_separately: true
    rl_checkpoint_selection_mode: proxy_property_success_hit_rate
    rl_prompt_source: benchmark_target_rows
    rl_diffusion_num_steps: 25
    sol_log_prob_floor: -5.0
    sol_log_prob_floor_by_class_overrides:
      polyamide: -12.0
    reward_weights:
      w_success: 2.0
      w_valid: 1.0
      w_novel: 0.0
      w_star: 1.0
      w_sa: 1.0
      w_sa_continuous: 0.5
      w_sol: 1.0
      w_chi: 2.0
    reward_weights_by_class_overrides:
      polyamide:
        w_success: 2.0
        w_valid: 1.0
        w_novel: 0.0
        w_star: 1.0
        w_sa: 1.0
        w_sa_continuous: 0.5
        w_sol: 2.0
        w_chi: 2.0
    reward_shaping:
      solubility_term_mode: logit_margin
      solubility_logit_clip: 30.0
      soluble_gate_bonus: 2.0
      insoluble_gate_penalty: -2.0
      chi_requires_soluble_ok: true
      insoluble_chi_scale: 0.0
    reward_curriculum:
      enabled: true
      transition_frac: 0.4
      success_final_scale: 2.0
      dense_final_scale: 0.5
    supervised_train_override_by_class_overrides:
      polyimide:
        s2:
          variant: mt
          checkpoint_selection_metric: val_aux_soluble_loss
          condition_dropout_rate: 0.05
          train_batch_mix:
            d_chi: 0.7
            d_water: 0.3
          mt_aux:
            head_type: linear
            soluble_loss_weight: 1.25
            chi_loss_weight: 0.05
    learning_rate: 1.0e-5
    weight_decay: 0.01
    warmup_steps: 0
    warmup_schedule: linear
    lr_schedule: constant_after_warmup
    kl_weight: 0.01
    gradient_checkpointing: true
    rl_num_steps: 2000
    policy_update_epochs: 1
    normalize_advantages: false
    ppo_clip_eps: 0.2
    grpo_group_size: 8
    grpo_advantage_epsilon: 1.0e-6
    rl_proxy_eval_interval_steps: 100
    rl_proxy_num_targets: 5
    rl_proxy_generation_budget: 64
    rl_min_train_fill_ratio: 0.50
    rl_partial_rollout_stop_attempt_frac: 0.50
    rl_low_fill_stop_ratio: 0.25
    rl_low_fill_patience: 3
    trajectories_per_batch: 48
    replay_batch_size: 16
    dpo:
      offline_pair_budget: 10000
      offline_pair_budget_by_class_overrides:
        polyether: 256
      d_water_budget_fraction: 0.2
      d_water_budget_fraction_by_class_overrides:
        polyimide: 0.5
      val_pair_fraction: 0.2
      beta: 0.02
      optimizer: adamw
      batch_size: 64
      learning_rate: 3.0e-5
      weight_decay: 0.01
      warmup_steps: 0
      warmup_schedule: linear
      lr_schedule: constant_after_warmup
      pair_source: chi_aware_plus_target_row_synthetic
      pair_refresh_mode: offline_fixed
      logprob_mode: single_step_t1
      checkpoint_selection_mode: proxy_property_success_hit_rate
      checkpoint_selection_mode_by_class_overrides:
        polyether: proxy_property_success_hit_rate
      proxy_eval_interval_epochs: 2
      num_epochs: 50
      synthetic_candidates_per_target: 16

  run_overrides:
    S0_raw_unconditional:
      generation_budget: 10000
      generation_budget_by_class:
        polyacrylate: 10000
        polyether: 10000
        polyamide: 10000
        polyester: 10000
        polyimide: 10000
        polysulfone: 10000
        polystyrene: 10000
      preserve_total_generation_across_rounds: false
    S3_conditional_guided:
      canonical_family: S3
      s2:
        variant: mt
        checkpoint_selection_metric: val_aux_soluble_loss
        condition_dropout_rate: 0.05
        train_batch_mix:
          d_chi: 0.7
          d_water: 0.3
        mt_aux:
          head_type: linear
          soluble_loss_weight: 1.25
          soluble_loss_weight_by_class_overrides:
            polyimide: 0.75
          chi_loss_weight: 0.05
      s2_by_class_overrides:
        polyacrylate:
          variant: pure
        polyimide:
          variant: mt
          checkpoint_selection_metric: val_aux_soluble_loss
      s3:
        guidance_start_frac: 0.75
        cfg_scale: 0.5
    S2_mt:
      canonical_family: S2
      s2:
        variant: mt
    S2_cfg_0p0:
      canonical_family: S2
      s2:
        cfg_scale: 0.0
    S2_cfg_2p0:
      canonical_family: S2
      s2:
        cfg_scale: 2.0
    S3_cfg_2p0:
      canonical_family: S3
      s2:
        variant: mt
        mt_aux:
          head_type: linear
          soluble_loss_weight: 0.25
          chi_loss_weight: 0.05
      s3:
        cfg_scale: 2.0
    S4_rl_finetuned:
      canonical_family: S4
      s4:
        normalize_advantages: true
    S4_dpo:
      canonical_family: S4
      s4:
        alignment_mode: dpo
    S4_ppo:
      canonical_family: S4
      s4:
        alignment_mode: ppo
        policy_update_epochs: 2
        normalize_advantages: true
        ppo_clip_eps: 0.2
    S4_grpo:
      canonical_family: S4
      s4:
        alignment_mode: grpo
        policy_update_epochs: 2
        normalize_advantages: true
        ppo_clip_eps: 0.2
        grpo_group_size: 8

step5_1:
  compare_all_enabled_runs: true
  summarize_by_canonical_family: true
  compare_metric: full_discovery_success_hit_rate

step5_hpo:
  enabled: true
  objective_metric: mean_success_hit_rate_discovery
  sampler: tpe
  sampler_seed: 42
  n_startup_trials: 8
  pruner: median
  pruner_n_startup_trials: 8
  pruner_n_warmup_steps: 2
  pruner_min_resource: 1
  pruner_max_resource: auto
  pruner_reduction_factor: 2
  storage_uri: sqlite:///results_<model_size>/step5_hpo/<split_mode>/<c_target>/<study_family>/optuna.db
  reuse_shared_s4_warm_start: true
  skip_disk_checkpoints: true
  hpo_s2_max_steps: 8000
  hpo_s2_val_checks: 3
  hpo_rl_num_steps: 256
  hpo_rl_proxy_eval_checks: 1
  hpo_sampling_batch_size: 64
  hpo_decode_class_match_sampling_attempts_max: 16
  hpo_decode_class_match_oversample_factor: 3.0
  hpo_decode_class_match_max_request_size: 512
  hpo_decode_class_match_max_total_raw_samples: 4096
  hpo_decode_partial_quota_min_fill_ratio: 0.25
  hpo_s4_trajectories_per_batch: 8
  hpo_s4_rl_diffusion_num_steps: 8
  hpo_s4_replay_batch_size: 8
  hpo_num_targets: 2
  hpo_generation_budget: 32
  hpo_generation_budget_by_class:
