# Inverse Polymer Design (water-soluble focus)
# Active workflow:
# Step 0: data prep
# Step 1: backbone training
# Step 2: sampling and generative evaluation
# Step 3: chi_target learning from labeled chi(T,phi) dataset
# Step 4: physics-guided chi(T,phi) model training (+ Optuna)
# Step 5: polymer-family class + water-soluble inverse design

paths:
  data_dir: "Data"
  polymer_file: "Data/Polymer/SMiPoly_polymers.gz"
  property_dir: "Data/Property"
  results_dir: "results"

data:
  random_seed: 42
  train_fraction: 0.2
  unlabeled_train_ratio: 0.95
  unlabeled_val_ratio: 0.05
  property_train_ratio: 0.8
  property_val_ratio: 0.1
  property_test_ratio: 0.1

tokenizer:
  special_tokens:
    pad: "[PAD]"
    mask: "[MASK]"
    bos: "[BOS]"
    eos: "[EOS]"
    unk: "[UNK]"
  max_length: 128

# Default architecture (matches small preset when model_size is not specified)
backbone:
  hidden_size: 384
  num_layers: 6
  num_heads: 6
  ffn_hidden_size: 1536
  dropout: 0.1
  max_position_embeddings: 256

# Presets used by --model_size in Step 1/2/3/4/5
model_sizes:
  small:
    # Architecture (depth-driven)
    hidden_size: 384
    num_layers: 6
    num_heads: 6
    ffn_hidden_size: 1536
    dropout: 0.1
    max_position_embeddings: 256
    # Training
    max_steps: 94460
    warmup_steps: 945
    batch_size: 128
    gradient_accumulation_steps: 4
    learning_rate: 2.598e-4
  medium:
    # Architecture (depth-driven)
    hidden_size: 768
    num_layers: 12
    num_heads: 12
    ffn_hidden_size: 3072
    dropout: 0.1
    max_position_embeddings: 256
    # Training
    max_steps: 70850
    warmup_steps: 708
    batch_size: 128
    gradient_accumulation_steps: 4
    learning_rate: 3.0e-4
  large:
    # Architecture (depth-driven)
    hidden_size: 1152
    num_layers: 18
    num_heads: 18
    ffn_hidden_size: 4608
    dropout: 0.1
    max_position_embeddings: 256
    # Training
    max_steps: 47230
    warmup_steps: 472
    batch_size: 128
    gradient_accumulation_steps: 8
    learning_rate: 3.518e-4
  xl:
    # Architecture (depth-driven)
    hidden_size: 1536
    num_layers: 24
    num_heads: 24
    ffn_hidden_size: 6144
    dropout: 0.1
    max_position_embeddings: 256
    # Training
    max_steps: 40480
    warmup_steps: 405
    batch_size: 64
    gradient_accumulation_steps: 16
    learning_rate: 3.824e-4

diffusion:
  num_steps: 50
  beta_min: 0.05
  beta_max: 0.95

training_backbone:
  batch_size: 128
  learning_rate: 3.0e-4
  weight_decay: 0.01
  warmup_steps: 1000
  max_steps: 300000
  gradient_clip_norm: 1.0
  eval_every: 1000
  save_every: 100000
  num_epochs: 50
  early_stopping_patience: 0  # 0 disables early stopping
  early_stopping_min_delta: 0.0  # minimum epoch-level val-loss improvement to reset patience

# Kept for embedding timestep and backward compatibility.
training_property:
  batch_size: 128
  learning_rate: 1.0e-3
  weight_decay: 0.01
  num_epochs: 500
  patience: 30
  freeze_backbone: true
  finetune_last_layers: 6  # legacy property-head setting; Step 4 uses chi_training.finetune_last_layers (fallback here if missing)
  default_timestep: 1

# Step 3-5 chi workflow config (per-step structure)
chi_training:
  shared:
    dataset_path: "Data/chi/polymers_T_phi.csv"  # labeled chi(T,phi) dataset (288 Polymer entries / 293 SMILES / 7,325 rows) used in Step 3 and Step4_1
    split_mode: "polymer"  # data split mode: polymer (hold out polymers) | random (row-wise random)
    classification_split_mode: "polymer"  # Step4_2 split mode (independent of split_mode used by Step4_1)
    split:
      # Step 5 uses a fixed 8:1:1 train/val/test split.
      train_ratio: 0.80
      val_ratio: 0.10
      test_ratio: 0.10
    embedding:
      timestep: 1  # diffusion timestep used for embedding extraction
      batch_size: 128  # batch size for embedding extraction

  step3_target_learning:
    target_objective: "balanced_accuracy"  # threshold objective: balanced_accuracy | youden_j | f1 | accuracy
    target_bootstrap_repeats: 800  # bootstrap repeats for chi_target stability estimation

  # Step4_1: chi(T,phi) regression
  # Main pipeline uses one random_seed per run; optional multi-seed evaluation is handled by scripts/step4_1_multiseed_eval.py.
  step4_1_regression:
    dataset_path: "Data/chi/polymers_T_phi.csv"
    batch_size: 128
    num_epochs: 500
    patience: 20
    learning_rate: 1.0e-3
    weight_decay: 1.0e-5
    gradient_clip_norm: 1.0
    use_scheduler: true
    scheduler_min_lr: 1.0e-6
    hidden_sizes: [256, 512, 128]
    dropout: 0.1
    finetune_last_layers: 0  # integer in [0, num_layers(model_size)]; 0=freeze backbone

    tune: true
    n_trials: 300
    tuning_epochs: 60
    tuning_patience: 10
    tuning_objective: "val_poly_nrmse"  # val_r2 | val_poly_nrmse
    # Step 4 uses cross validation for tuning; Step 5 ignores these folds and uses the fixed split above.
    tuning_cv_folds: 5
    budget_search_epochs: 250  # capped post-Optuna CV used to derive final-fit epochs
    budget_search_patience: 20
    epoch_selection_metric: "val_poly_nrmse"  # val_rmse | val_poly_nrmse
    loss_weighting: "polymer_balanced"  # uniform | polymer_balanced
    loss_weight_clip_ratio: 10.0
    scheduler_t_max: null  # null => use num_epochs; final fit overrides to preserve LR schedule shape
    nrmse_std_floor: 0.02
    nrmse_clip: 10.0
    optuna_search_space:
      # If list has exactly 2 values, it is treated as a continuous range [min, max].
      # If list has >2 values, it is treated as categorical choices.
      # finetune_last_layers defaults to dynamic range [0, num_layers(model_size)] if omitted.
      num_layers: [2, 3, 4, 5]
      hidden_units: [64, 128, 256, 512, 1024]
      dropout: [0.0, 0.1, 0.2, 0.3]
      learning_rate: [1.0e-4, 5.0e-3]
      learning_rate_log: true
      weight_decay: [1.0e-7, 1.0e-3]
      weight_decay_log: true
      batch_size: [4, 8, 16, 32, 64, 128]

  # Step4_2: water-miscible classification
  step4_2_classification:
    dataset_path:
      - "Data/water_solvent/water_miscible_polymer.csv"
      - "Data/water_solvent/water_immiscible_polymer.csv"
    batch_size: 128
    num_epochs: 500
    patience: 20
    learning_rate: 1.0e-3
    weight_decay: 1.0e-5
    gradient_clip_norm: 1.0
    use_scheduler: true
    scheduler_min_lr: 1.0e-6
    hidden_sizes: [256, 512, 128]
    dropout: 0.1
    finetune_last_layers: 0  # integer in [0, num_layers(model_size)]; 0=freeze backbone

    tune: true
    n_trials: 200
    tuning_epochs: 60
    tuning_patience: 10
    # Step 4 uses cross validation for tuning; Step 5 ignores these folds and uses the fixed split above.
    tuning_cv_folds: 5
    optuna_search_space:
      # If list has exactly 2 values, it is treated as a continuous range [min, max].
      # If list has >2 values, it is treated as categorical choices.
      # finetune_last_layers defaults to dynamic range [0, num_layers(model_size)] if omitted.
      num_layers: [2, 3, 4, 5]
      hidden_units: [64, 128, 256, 512, 1024]
      dropout: [0.0, 0.1, 0.2, 0.3]
      learning_rate: [1.0e-4, 5.0e-3]
      learning_rate_log: true
      weight_decay: [1.0e-7, 1.0e-3]
      weight_decay_log: true
      batch_size: [4, 8, 16, 32, 64]

  # Step 5 inverse-design scoring (class + property)
  step5_inverse_design:
    target_temperature: 293.15  # room temperature (K)
    target_phi: 0.2             # polymer fraction
    epsilon: 0.05
    # ranking uses independent hard filters (soluble_hit, property_hit, polymer_class_hit) first
    target_polymer_count: 100  # final total number of exported target polymers across all Step 5 resampling attempts
    target_sa_max: 4.0
    candidate_source: "novel"  # fresh Step 2 resampling only
    resampling_target_polymer_count: 512  # accepted Step 2 candidates requested per fresh attempt before Step 5 scoring
    sampling_attempts_max: 5000  # stop early once 100 final Step 5 targets are found; otherwise keep resampling until the max is reached
    property_rule: "upper_bound"
    coverage_topk: 5
    target_polymer_class: "polyimide"  # all | * | or any key defined under polymer_classes below
    uncertainty_enabled: false
    uncertainty_mc_samples: 20
    uncertainty_class_z: 1.0
    uncertainty_property_z: 1.0
    uncertainty_score_weight: 0.0
    uncertainty_seed: 42
    decode_constraint_enabled: true  # Step 5 only: inject class-specific token motifs during fresh Step 2 resampling
    decode_constraint_family_sampling_default_mode: "motif"  # Step 5 only: default family-aware decoding mode when no class override is provided
    decode_constraint_family_sampling_scope: "final_only"  # Step 5 only: current class-family decoding is applied to final inverse-design generation, not RL rollouts
    decode_constraint_family_sampling_mode_overrides:
      polyimide: "backbone_template"
      polyamide: "motif"  # polyamide backbone templates over-bias long hydrophobic scaffolds and suppress soluble hits in Step 5
      polyester: "backbone_template"
      polyether: "motif"  # polyether motif decoding improves soluble hits in Step 5 more reliably than the old backbone-template prior
      polysulfone: "backbone_template"
    decode_constraint_motif_bank_json: null  # optional JSON mapping class -> list of p-SMILES motif fragments
    decode_constraint_resolution_strategy: "configured_or_defaults"  # Step 5 only: safer default than local auto-mined motifs; can override to configured_or_local_mined_or_defaults
    decode_constraint_max_motifs: 6
    decode_constraint_spans_per_sample: 2  # Step 5 only: fix multiple class motifs per sequence to raise rare-class hit rate
    decode_constraint_center_min_frac: 0.25  # motif center placement lower bound as a fraction of sequence length
    decode_constraint_center_max_frac: 0.75  # motif center placement upper bound as a fraction of sequence length
    decode_constraint_center_min_frac_overrides:
      polyimide: 0.35
      polysulfone: 0.35
    decode_constraint_center_max_frac_overrides:
      polyimide: 0.65
      polysulfone: 0.65
    decode_constraint_backbone_template_enabled: true  # Step 5 only: global switch for backbone-template family decoding
    decode_constraint_backbone_template_classes: ["polyimide", "polyamide", "polyester", "polyether", "polysulfone"]  # Step 5 only: backbone-template mode for current backbone target classes
    decode_constraint_backbone_template_max_templates: 3
    decode_constraint_backbone_template_max_templates_overrides:
      polyamide: 6
      polyimide: 4
      polysulfone: 4
    decode_constraint_backbone_template_min_gap_tokens: 3
    decode_constraint_backbone_template_min_gap_tokens_overrides:
      polyimide: 4
      polysulfone: 3
    decode_constraint_backbone_template_terminal_star_anchor: false
    decode_constraint_backbone_template_terminal_star_anchor_overrides:
      polyamide: true
      polyether: true
      polyester: true
      polyimide: true
      polysulfone: true
    decode_constraint_cycle_backbone_template_cores_across_targets: false
    decode_constraint_enforce_class_match: true  # exact SMARTS class filter during constrained Step 2 valid-only acceptance
    decode_constraint_enforce_backbone_class_match: true  # require class motif on backbone (shortest path between * atoms) for backbone classes
    decode_constraint_class_match_sampling_attempts_max: 24
    decode_constraint_class_match_sampling_attempts_max_overrides:
      polyamide: 24
      polyether: 24
      polyimide: 48
      polysulfone: 24
    decode_constraint_class_match_oversample_factor: 3.0
    decode_constraint_class_match_oversample_factor_overrides:
      polyamide: 3.0
      polyimide: 6.0
      polysulfone: 3.0
    decode_constraint_class_match_min_request_size: 1
    decode_constraint_class_match_min_request_size_overrides:
      polyamide: 4
      polyimide: 4
      polysulfone: 6
      polystyrene: 8
    decode_constraint_allow_partial_quota_return: true
    decode_constraint_allow_partial_quota_return_overrides:
      polyamide: true
      polyimide: true
    decode_constraint_partial_quota_min_fill_ratio: 0.95
    decode_constraint_partial_quota_min_fill_ratio_overrides:
      polyamide: 0.95
      polyimide: 0.60
    decode_constraint_enforce_star_ok_acceptance: false
    decode_constraint_enforce_star_ok_acceptance_overrides:
      polyacrylate: true
      polyamide: true
      polyether: true
      polyimide: true
      polyester: true
      polysulfone: true
      polystyrene: true
    decode_constraint_reject_duplicate_canonical_acceptance: true
    decode_constraint_reject_duplicate_canonical_across_targets: false
    decode_constraint_reject_duplicate_canonical_across_targets_overrides:
      polyimide: true
    decode_constraint_reject_sidechain_backbone_hybrid: false
    decode_constraint_reject_sidechain_backbone_hybrid_overrides:
      polyacrylate: true
      polystyrene: true
    decode_constraint_allowed_atomic_symbols_overrides:
      polyimide: ["C", "N", "O", "*"]
      polyamide: ["C", "N", "O", "*"]
      polyester: ["C", "O", "*"]
      polyether: ["C", "O", "*"]
      polysulfone: ["C", "O", "S", "*"]
      polyacrylate: ["C", "N", "O", "*"]
      polystyrene: ["C", "N", "O", "*"]
    decode_constraint_forbidden_tokens: ["[15N+]"]  # Step 5 only: suppress isotopic charged nitrogen token during sampling and acceptance
    decode_constraint_forbidden_tokens_overrides: {}
    decode_constraint_use_class_length_prior: true  # Step 5 only: sample token lengths from local target-class polymers when available
    decode_constraint_length_prior_max_tokens_overrides:
      polyimide: 29
    resampling_skip_novelty_filter: false  # Step 5 only: keep valid class-matched proposals first; novelty is re-applied downstream
    resampling_skip_sa_filter: false  # Step 5 only: defer SA screening until after Step 2 proposal generation

checkpointing:
  save_best_only: true
  save_last: false
  save_periodic: false

optimization:
  use_amp: true
  compile_model: true
  compile_mode: "default"
  gradient_accumulation_steps: 4
  num_workers: 4
  pin_memory: true
  cudnn_benchmark: true
  prefetch_factor: 2
  cache_tokenization: true

sampling:
  batch_size: 128  # raw generation batch size for Step 2 sampling
  temperature: 0.9  # sampling temperature (higher gives more diversity)
  top_k: null  # token filter: null disables, integer > 0 keeps top-k tokens
  top_p: null  # nucleus filter: null disables, value in (0, 1] enables
  target_stars: 2  # desired count of "*" tokens in generated polymers
  target_polymer_count: 10000  # Step 2 target count after final filtering
  target_sa_max: 4.0  # SA cutoff for Step 2 target-polymers export
  valid_only: true  # if true, keep sampling rounds until target count is reached
  valid_only_require_target_stars: true  # in valid-only rounds enforce star_count == target_stars
  variable_length: false  # token-length mode: false uses train length profile, true uses range below
  variable_length_min_tokens: 12  # minimum token length when variable_length=true
  variable_length_max_tokens: 100  # maximum token length when variable_length=true
  variable_length_samples_per_length: 16  # number of samples drawn per length bucket
  valid_only_max_rounds: 25  # maximum valid-only resampling rounds
  valid_only_min_samples_per_round: 256  # minimum raw requests per valid-only round
  valid_only_fail_on_shortfall: false  # if true, Step 2 exits when rounds cannot hit target count
  use_constraints: true  # enable constrained sampler checks (syntax/ring/star constraints)

# SMARTS-like family tags used in Step 5.
# These are motif tags for screening, not strict mutually exclusive polymer taxonomy.
polymer_classes:
  polyimide: "[#6][CX3](=[OX1])[NX3][CX3](=[OX1])[#6]"
  polyester: "[#6][CX3](=[OX1])[OX2][#6]"
  polyamide: "[#6][CX3](=[OX1])[NX3;!$([N]([C](=O))[C](=O))][#6;!$([CX3](=[OX1]))]"
  polyurethane: "[#6][OX2][CX3](=[OX1])[NX3][#6]"
  polyether: "[#6;!$([CX3](=[OX1]))][OX2][#6;!$([CX3](=[OX1]))]"
  polysiloxane: "[Si][OX2][Si]"
  polycarbonate: "[#6][OX2][CX3](=[OX1])[OX2][#6]"
  polysulfone: "[#6][SX4](=[OX1])(=[OX1])[#6]"
  polyacrylate: "[#6]-[#6](=O)-[#8]"
  polystyrene: "[#6]-[#6](c1ccccc1)-[#6]"

plotting:
  figure_size: [4.5, 4.5]
  font_size: 16
  dpi: 600
